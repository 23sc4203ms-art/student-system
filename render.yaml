services:
  - type: web
    name: jmmb-student-system
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          property: url
      - key: DB_CONNECTION
        value: mysql
    healthCheckPath: /up
    autoDeploy: true
